# 飞猪道旅 - 接机查价接口
# 环境变量通过 .env 文件配置，用例中通过 ${变量名} 引用
# 使用前请确保 .env 中已配置：FLIGGY_CLIENT_ID、FLIGGY_CLIENT_SECRET、FLIGGY_ENV

- case_name: "接机查价-关西机场到心斋桥"
  method: POST
  base_url: "https://${FLIGGY_ENV}gateway-travelswitch.fliggy.com"
  url: /open/distribution/daolvetravel/openapiSupplier/queryPrice
  headers:
    Content-Type: "application/json"
    clientid: "${FLIGGY_CLIENT_ID}"
    clientSecret: "${FLIGGY_CLIENT_SECRET}"
  json:
    flightNumber: "K6789"
    endPoint:
      coordinates:
        lat: 34.6734038
        lon: 135.5013019
      name: "大丸(心斋桥店)"
      type: "2"
    startPoint:
      iata: "KIX"
      name: "关西国际机场"
      type: "1"
    luggage: 1
    passengers: 3
    useTime: "2026-05-28 21:44:00"
  extract:
    quotation_code: $.data.vehicleQuotationList[0].quotationCode    # 提取第一个车型报价编码
  expect:
    status_code: 200

- case_name: "接机创单-关西机场到心斋桥"
  method: POST
  base_url: "https://${FLIGGY_ENV}gateway-travelswitch.fliggy.com"
  url: /open/distribution/daolvetravel/openapiSupplier/createOrder
  headers:
    Content-Type: "application/json"
    clientid: "${FLIGGY_CLIENT_ID}"
    clientSecret: "${FLIGGY_CLIENT_SECRET}"
  json:
    quotationCode: "${quotation_code}"
    amount: 360
    startPoint:
      name: "关西国际机场"
      address: "关西国际机场地址"
    endPoint:
      name: "大丸(心斋桥店)"
      address: "大丸(心斋桥店)地址"
    resellerOrderNo: "daolvtest1${timestamp}"
    customInfo:
      backupContactPhone: "13193893700"
      contactName: "测试"
      countryCallingCode: "+1"
      contactPhone: "18838975769"
      contactEmail: "default@example.com"
      passengerRemark: "Default Remark备注测试"
      socialWayDTOList:
        - socialAccount: 9999999
          socialWay: "wechat"
    passengers: 4
    luggage: 1
    useTime: "2026-05-28 13:55:00"
  expect:
    status_code: 200
