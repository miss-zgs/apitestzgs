- case_name: "GET请求-查询帖子列表"
  method: GET
  url: /posts
  params:
    _limit: 3
  expect:
    status_code: 200

- case_name: "GET请求-查询单个帖子"
  method: GET
  url: /posts/1
  expect:
    status_code: 200
    body:
      $.id: 1

- case_name: "POST请求-创建帖子"
  method: POST
  url: /posts
  json:
    title: "测试标题"
    body: "测试内容"
    userId: 1
  expect:
    status_code: 201
    body:
      $.title: "测试标题"
