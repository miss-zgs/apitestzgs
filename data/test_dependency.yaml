# 接口依赖编排示例
# 场景：先查询帖子列表 → 提取第一个帖子的 ID → 用 ID 查询帖子详情 → 用 userId 查询该用户
# 关键语法：
#   extract: 从响应中用 jsonpath 提取值存入上下文
#   ${变量名}: 引用上下文中的变量

- case_name: "步骤1-查询帖子列表并提取ID"
  method: GET
  url: /posts
  params:
    _limit: 1
  extract:
    post_id: "$[0].id"          # 提取第一个帖子的 id
    post_user_id: "$[0].userId" # 提取第一个帖子的 userId
  expect:
    status_code: 200

- case_name: "步骤2-用提取的ID查询帖子详情"
  method: GET
  url: /posts/${post_id}
  extract:
    post_title: $.title         # 提取帖子标题
  expect:
    status_code: 200
    jsonpath:
      $.id: "${post_id}"

- case_name: "步骤3-用提取的userId查询该用户"
  method: GET
  url: /users/${post_user_id}
  expect:
    status_code: 200
    jsonpath:
      $.id: "${post_user_id}"
